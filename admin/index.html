<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinners Precious School CMS</title>
    <!-- Load Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <style>
        /* ========================================
           PROFESSIONAL CUSTOM STYLES FOR DECAP CMS
           Shinners Precious School Branding
           ======================================== */

        /* Hide Decap CMS default logo and header */
        .decap-cms-logo {
            display: none !important;
        }
        .decap-cms-header {
            background: #800020 !important;
            padding: 15px 20px !important;
            border-bottom: 3px solid #D4AF37 !important;
        }
        .decap-cms-header .decap-cms-logo {
            display: none !important;
        }
        
        /* Add custom header with school name and logo */
        .decap-cms-header:before {
            content: "🏫 Shinners Precious School";
            font-size: 20px;
            font-weight: bold;
            color: white;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Style the sidebar */
        .decap-cms-sidebar {
            background: #1a1a2e !important;
            border-right: 2px solid #D4AF37 !important;
        }
        .decap-cms-sidebar-item {
            color: white !important;
            font-weight: 500 !important;
            padding: 12px 20px !important;
            border-radius: 8px !important;
            margin: 4px 10px !important;
            transition: all 0.3s !important;
        }
        .decap-cms-sidebar-item:hover {
            background: #800020 !important;
            color: #D4AF37 !important;
        }
        .decap-cms-sidebar-item-active {
            background: #800020 !important;
            color: #D4AF37 !important;
            border-left: 4px solid #D4AF37 !important;
        }

        /* Style the main content area */
        .decap-cms-content {
            background: #f5f0eb !important;
        }

        /* Style buttons to match school brand */
        .decap-cms-button-primary {
            background: #800020 !important;
            border: none !important;
            border-radius: 6px !important;
            padding: 10px 20px !important;
            font-weight: 600 !important;
            transition: all 0.3s !important;
        }
        .decap-cms-button-primary:hover {
            background: #a00028 !important;
            transform: translateY(-2px) !important;
            box-shadow: 0 4px 12px rgba(128, 0, 32, 0.3) !important;
        }

        /* Style cards and panels */
        .decap-cms-card {
            border-radius: 12px !important;
            border: 1px solid #e8e0d8 !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06) !important;
        }

        /* Welcome message on login page */
        .decap-cms-login-page {
            background: linear-gradient(135deg, #800020, #5a0016) !important;
        }
        .decap-cms-login-box {
            background: white !important;
            border-radius: 16px !important;
            padding: 40px !important;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3) !important;
            border-top: 6px solid #D4AF37 !important;
            max-width: 400px !important;
            width: 100% !important;
        }
        .decap-cms-login-box:before {
            content: "";
            display: block;
            margin: 0 auto 25px;
            width: 80px;
            height: 80px;
            background: url('https://shinnerspreciousacademy.netlify.app/images/logo.png') center/contain no-repeat;
            border-radius: 50%;
            border: 3px solid #D4AF37;
        }
        .decap-cms-login-box h1 {
            display: none !important;
        }
        .decap-cms-login-box .decap-cms-login-title {
            display: none !important;
        }

        /* School name on login page */
        .decap-cms-login-box:after {
            content: "🏫 Shinners Precious School";
            display: block;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #800020;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        /* Login subtitle */
        .decap-cms-login-box .login-subtitle {
            display: block;
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        /* Style form inputs on login */
        .decap-cms-login-box input[type="email"],
        .decap-cms-login-box input[type="password"] {
            border: 2px solid #e0d6cc !important;
            border-radius: 8px !important;
            padding: 12px 16px !important;
            font-size: 16px !important;
            transition: border-color 0.3s !important;
        }
        .decap-cms-login-box input[type="email"]:focus,
        .decap-cms-login-box input[type="password"]:focus {
            border-color: #800020 !important;
            outline: none !important;
            box-shadow: 0 0 0 3px rgba(128, 0, 32, 0.1) !important;
        }

        /* Style login button */
        .decap-cms-login-box button[type="submit"] {
            background: #800020 !important;
            border: none !important;
            border-radius: 8px !important;
            padding: 14px !important;
            font-size: 16px !important;
            font-weight: 600 !important;
            color: white !important;
            transition: all 0.3s !important;
            width: 100% !important;
            margin-top: 10px !important;
        }
        .decap-cms-login-box button[type="submit"]:hover {
            background: #a00028 !important;
            transform: translateY(-2px) !important;
            box-shadow: 0 4px 15px rgba(128, 0, 32, 0.3) !important;
        }

        /* Style the collection names in sidebar with icons */
        .decap-cms-sidebar-item[data-collection="settings"]:before {
            content: "⚙️ ";
        }
        .decap-cms-sidebar-item[data-collection="news"]:before {
            content: "📰 ";
        }
        .decap-cms-sidebar-item[data-collection="testimonials"]:before {
            content: "💬 ";
        }
        .decap-cms-sidebar-item[data-collection="leadership"]:before {
            content: "👨‍🏫 ";
        }
        .decap-cms-sidebar-item[data-collection="gallery"]:before {
            content: "🖼️ ";
        }
        .decap-cms-sidebar-item[data-collection="staff"]:before {
            content: "👥 ";
        }
        .decap-cms-sidebar-item[data-collection="uniform"]:before {
            content: "👕 ";
        }
        .decap-cms-sidebar-item[data-collection="school-life"]:before {
            content: "⚽ ";
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .decap-cms-header:before {
                font-size: 16px;
                content: "🏫 Shinners CMS";
            }
            .decap-cms-login-box {
                padding: 30px 20px !important;
                margin: 20px !important;
            }
            .decap-cms-login-box:before {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
