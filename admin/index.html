<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinners Precious School CMS</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>">
    <style>
        /* ========================================
           SHINNERS PRECIOUS SCHOOL - CMS BRANDING
           ======================================== */

        /* ---- LOGIN PAGE ---- */
        .decap-cms-login-page {
            background: linear-gradient(135deg, #800020 0%, #5a0016 100%) !important;
            min-height: 100vh !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }
        
        .decap-cms-login-box {
            background: white !important;
            border-radius: 16px !important;
            padding: 40px !important;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4) !important;
            border-top: 6px solid #D4AF37 !important;
            max-width: 400px !important;
            width: 100% !important;
            text-align: center !important;
            position: relative !important;
        }
        
        /* Hide default Decap CMS login title */
        .decap-cms-login-box h1 {
            display: none !important;
        }
        .decap-cms-login-box .decap-cms-login-title {
            display: none !important;
        }
        .decap-cms-logo {
            display: none !important;
        }
        
        /* School Logo */
        .decap-cms-login-box .login-logo {
            display: block !important;
            margin: 0 auto 20px !important;
            width: 80px !important;
            height: 80px !important;
            background: url('https://shinners-precious-academy.netlify.app/images/logo.png') center/contain no-repeat !important;
            border-radius: 50% !important;
            border: 3px solid #D4AF37 !important;
            background-color: white !important;
        }
        
        /* School Name */
        .decap-cms-login-box .login-school-name {
            display: block !important;
            font-size: 22px !important;
            font-weight: 700 !important;
            color: #800020 !important;
            letter-spacing: 1px !important;
            margin-bottom: 5px !important;
        }
        
        .decap-cms-login-box .login-school-motto {
            display: block !important;
            font-size: 13px !important;
            color: #D4AF37 !important;
            font-weight: 600 !important;
            letter-spacing: 2px !important;
            margin-bottom: 20px !important;
        }
        
        .decap-cms-login-box .login-subtitle {
            display: none !important;
        }

        /* ---- HEADER (After Login) ---- */
        .decap-cms-header {
            background: #800020 !important;
            padding: 12px 25px !important;
            border-bottom: 4px solid #D4AF37 !important;
            min-height: 65px !important;
            display: flex !important;
            align-items: center !important;
        }
        
        .decap-cms-header .decap-cms-logo {
            display: none !important;
        }
        .decap-cms-header .decap-cms-header__link {
            display: none !important;
        }
        
        .decap-cms-header .school-header {
            display: flex !important;
            align-items: center !important;
            gap: 15px !important;
            width: 100% !important;
            color: white !important;
        }
        
        .decap-cms-header .school-header .school-logo {
            width: 40px !important;
            height: 40px !important;
            background: url('https://shinners-precious-academy.netlify.app/images/logo.png') center/contain no-repeat !important;
            border-radius: 50% !important;
            border: 2px solid #D4AF37 !important;
            flex-shrink: 0 !important;
            background-color: white !important;
        }
        
        .decap-cms-header .school-header .school-name {
            font-size: 18px !important;
            font-weight: 700 !important;
            color: white !important;
            letter-spacing: 1px !important;
        }
        
        .decap-cms-header .school-header .school-tagline {
            font-size: 11px !important;
            color: #D4AF37 !important;
            letter-spacing: 0.5px !important;
            font-weight: 400 !important;
            margin-left: 5px !important;
        }

        /* ---- SIDEBAR ---- */
        .decap-cms-sidebar {
            background: #1a1a2e !important;
            border-right: 2px solid #D4AF37 !important;
        }
        
        .decap-cms-sidebar-item {
            color: #ccc !important;
            font-weight: 500 !important;
            padding: 12px 20px !important;
            border-radius: 8px !important;
            margin: 4px 10px !important;
            transition: all 0.3s !important;
        }
        
        .decap-cms-sidebar-item:hover {
            background: rgba(128, 0, 32, 0.3) !important;
            color: white !important;
        }
        
        .decap-cms-sidebar-item-active {
            background: #800020 !important;
            color: #D4AF37 !important;
            border-left: 4px solid #D4AF37 !important;
        }

        @media (max-width: 768px) {
            .decap-cms-header .school-header .school-name {
                font-size: 14px !important;
            }
            .decap-cms-header .school-header .school-tagline {
                font-size: 10px !important;
            }
            .decap-cms-header .school-header .school-logo {
                width: 32px !important;
                height: 32px !important;
            }
            .decap-cms-login-box {
                padding: 30px 20px !important;
                margin: 20px !important;
            }
            .decap-cms-login-box .login-logo {
                width: 60px !important;
                height: 60px !important;
            }
            .decap-cms-login-box .login-school-name {
                font-size: 18px !important;
            }
        }
    </style>
</head>
<body>
    <!-- Custom Login Content -->
    <div id="custom-login" style="display: none; min-height: 100vh; background: linear-gradient(135deg, #800020, #5a0016); display: flex; justify-content: center; align-items: center; padding: 20px;">
        <div style="background: white; border-radius: 16px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); border-top: 6px solid #D4AF37; max-width: 400px; width: 100%; text-align: center;">
            <div style="width: 80px; height: 80px; margin: 0 auto 20px; background: url('https://shinners-precious-academy.netlify.app/images/logo.png') center/contain no-repeat; border-radius: 50%; border: 3px solid #D4AF37; background-color: white;"></div>
            <div style="font-size: 22px; font-weight: 700; color: #800020; letter-spacing: 1px; margin-bottom: 5px;">Shinners Precious School</div>
            <div style="font-size: 13px; color: #D4AF37; font-weight: 600; letter-spacing: 2px; margin-bottom: 20px;">Determined to win</div>
            <div id="login-form-placeholder"></div>
        </div>
    </div>

    <script>
        // Inject custom login page
        document.addEventListener('DOMContentLoaded', function() {
            // Wait for Decap CMS to load
            setTimeout(function() {
                // Hide default login and show custom login
                const loginBox = document.querySelector('.decap-cms-login-box');
                const loginPage = document.querySelector('.decap-cms-login-page');
                
                if (loginBox && loginPage) {
                    // Hide default login elements
                    loginBox.querySelector('h1')?.remove();
                    loginBox.querySelector('.decap-cms-login-title')?.remove();
                    
                    // Add custom elements
                    const logoDiv = document.createElement('div');
                    logoDiv.className = 'login-logo';
                    loginBox.prepend(logoDiv);
                    
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'login-school-name';
                    nameSpan.textContent = 'Shinners Precious School';
                    loginBox.prepend(nameSpan);
                    
                    const mottoSpan = document.createElement('span');
                    mottoSpan.className = 'login-school-motto';
                    mottoSpan.textContent = 'Determined to win';
                    loginBox.prepend(mottoSpan);
                }
            }, 500);
        });

        // Inject custom header after Decap CMS loads
        (function() {
            function injectHeader() {
                const header = document.querySelector('.decap-cms-header');
                if (header && !header.querySelector('.school-header')) {
                    header.innerHTML = '';
                    header.innerHTML = `
                        <div class="school-header">
                            <div class="school-logo"></div>
                            <div>
                                <span class="school-name">Shinners Precious School</span>
                                <span class="school-tagline">Content Management System</span>
                            </div>
                        </div>
                    `;
                    return true;
                }
                return false;
            }

            // Try immediately
            if (!injectHeader()) {
                const observer = new MutationObserver(function() {
                    if (injectHeader()) {
                        observer.disconnect();
                    }
                });
                observer.observe(document.body, {
                    childList: true,
                    subtree: true
                });
                setTimeout(function() {
                    injectHeader();
                    observer.disconnect();
                }, 3000);
            }
        })();
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
