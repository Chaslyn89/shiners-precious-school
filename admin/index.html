<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinners Precious School CMS</title>
    <!-- Load Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <style>
        /* ========================================
           PROFESSIONAL CUSTOM STYLES FOR DECAP CMS
           Shinners Precious School Branding
           ======================================== */

        /* ---- HIDE DEFAULT DECAP CMS HEADER ---- */
        .decap-cms-header .decap-cms-logo {
            display: none !important;
        }
        .decap-cms-logo {
            display: none !important;
        }
        .decap-cms-header .decap-cms-header__link {
            display: none !important;
        }
        
        /* ---- CUSTOM HEADER ---- */
        .decap-cms-header {
            background: #800020 !important;
            padding: 15px 25px !important;
            border-bottom: 4px solid #D4AF37 !important;
            min-height: 70px !important;
            display: flex !important;
            align-items: center !important;
        }
        
        .decap-cms-header .custom-header {
            display: flex !important;
            align-items: center !important;
            gap: 15px !important;
            width: 100% !important;
        }
        
        .decap-cms-header .custom-header .header-logo {
            width: 45px !important;
            height: 45px !important;
            background: url('https://shinnerspreciousacademy.netlify.app/images/logo.png') center/contain no-repeat !important;
            border-radius: 50% !important;
            border: 2px solid #D4AF37 !important;
            flex-shrink: 0 !important;
            background-color: white !important;
        }
        
        .decap-cms-header .custom-header .header-title {
            display: flex !important;
            flex-direction: column !important;
        }
        
        .decap-cms-header .custom-header .header-title .school-name {
            font-size: 20px !important;
            font-weight: 700 !important;
            color: white !important;
            letter-spacing: 1px !important;
            line-height: 1.2 !important;
        }
        
        .decap-cms-header .custom-header .header-title .school-tagline {
            font-size: 12px !important;
            color: #D4AF37 !important;
            letter-spacing: 0.5px !important;
            font-weight: 400 !important;
        }
        
        /* ---- SIDEBAR STYLING ---- */
        .decap-cms-sidebar {
            background: #1a1a2e !important;
            border-right: 2px solid #D4AF37 !important;
            padding-top: 10px !important;
        }
        
        .decap-cms-sidebar-item {
            color: #ccc !important;
            font-weight: 500 !important;
            padding: 12px 20px !important;
            border-radius: 8px !important;
            margin: 4px 10px !important;
            transition: all 0.3s !important;
            font-size: 14px !important;
        }
        
        .decap-cms-sidebar-item:hover {
            background: rgba(128, 0, 32, 0.3) !important;
            color: white !important;
        }
        
        .decap-cms-sidebar-item-active {
            background: #800020 !important;
            color: #D4AF37 !important;
            border-left: 4px solid #D4AF37 !important;
        }
        
        /* ---- CONTENT AREA ---- */
        .decap-cms-content {
            background: #f5f0eb !important;
        }

        /* ---- BUTTONS ---- */
        .decap-cms-button-primary {
            background: #800020 !important;
            border: none !important;
            border-radius: 6px !important;
            padding: 10px 20px !important;
            font-weight: 600 !important;
            transition: all 0.3s !important;
        }
        .decap-cms-button-primary:hover {
            background: #a00028 !important;
            transform: translateY(-2px) !important;
            box-shadow: 0 4px 12px rgba(128, 0, 32, 0.3) !important;
        }

        /* ---- LOGIN PAGE ---- */
        .decap-cms-login-page {
            background: linear-gradient(135deg, #800020 0%, #5a0016 100%) !important;
            min-height: 100vh !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }
        
        .decap-cms-login-box {
            background: white !important;
            border-radius: 16px !important;
            padding: 40px !important;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4) !important;
            border-top: 6px solid #D4AF37 !important;
            max-width: 400px !important;
            width: 100% !important;
            text-align: center !important;
        }
        
        .decap-cms-login-box .login-logo {
            display: block !important;
            margin: 0 auto 20px !important;
            width: 80px !important;
            height: 80px !important;
            background: url('https://shinnerspreciousacademy.netlify.app/images/logo.png') center/contain no-repeat !important;
            border-radius: 50% !important;
            border: 3px solid #D4AF37 !important;
            background-color: white !important;
        }
        
        .decap-cms-login-box .login-school-name {
            display: block !important;
            font-size: 22px !important;
            font-weight: 700 !important;
            color: #800020 !important;
            letter-spacing: 1px !important;
            margin-bottom: 5px !important;
        }
        
        .decap-cms-login-box .login-subtitle {
            display: block !important;
            color: #666 !important;
            font-size: 14px !important;
            margin-bottom: 25px !important;
            letter-spacing: 0.5px !important;
        }
        
        .decap-cms-login-box h1 {
            display: none !important;
        }
        .decap-cms-login-box .decap-cms-login-title {
            display: none !important;
        }

        /* ---- LOGIN INPUTS ---- */
        .decap-cms-login-box input[type="email"],
        .decap-cms-login-box input[type="password"] {
            border: 2px solid #e0d6cc !important;
            border-radius: 8px !important;
            padding: 12px 16px !important;
            font-size: 16px !important;
            transition: border-color 0.3s !important;
            width: 100% !important;
            margin-bottom: 15px !important;
        }
        .decap-cms-login-box input[type="email"]:focus,
        .decap-cms-login-box input[type="password"]:focus {
            border-color: #800020 !important;
            outline: none !important;
            box-shadow: 0 0 0 3px rgba(128, 0, 32, 0.1) !important;
        }

        .decap-cms-login-box button[type="submit"] {
            background: #800020 !important;
            border: none !important;
            border-radius: 8px !important;
            padding: 14px !important;
            font-size: 16px !important;
            font-weight: 600 !important;
            color: white !important;
            transition: all 0.3s !important;
            width: 100% !important;
            margin-top: 5px !important;
            cursor: pointer !important;
        }
        .decap-cms-login-box button[type="submit"]:hover {
            background: #a00028 !important;
            transform: translateY(-2px) !important;
            box-shadow: 0 4px 15px rgba(128, 0, 32, 0.3) !important;
        }

        /* ---- RESPONSIVE ---- */
        @media (max-width: 768px) {
            .decap-cms-header .custom-header .header-title .school-name {
                font-size: 14px !important;
            }
            .decap-cms-header .custom-header .header-title .school-tagline {
                font-size: 10px !important;
            }
            .decap-cms-login-box {
                padding: 30px 20px !important;
                margin: 20px !important;
            }
            .decap-cms-login-box .login-logo {
                width: 60px !important;
                height: 60px !important;
            }
            .decap-cms-login-box .login-school-name {
                font-size: 18px !important;
            }
            .decap-cms-header {
                padding: 10px 15px !important;
            }
            .decap-cms-header .custom-header .header-logo {
                width: 35px !important;
                height: 35px !important;
            }
        }
    </style>
</head>
<body>
    <script>
        // Custom JavaScript to inject header after CMS loads
        document.addEventListener('DOMContentLoaded', function() {
            // Wait for CMS to fully load
            setTimeout(function() {
                // Find the header
                const header = document.querySelector('.decap-cms-header');
                if (header) {
                    // Clear existing content
                    header.innerHTML = '';
                    // Add custom header
                    const customHeader = document.createElement('div');
                    customHeader.className = 'custom-header';
                    customHeader.innerHTML = `
                        <div class="header-logo"></div>
                        <div class="header-title">
                            <span class="school-name">Shinners Precious School</span>
                            <span class="school-tagline">Content Management System</span>
                        </div>
                    `;
                    header.appendChild(customHeader);
                }
            }, 1000);
        });
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
