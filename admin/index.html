<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinners Precious School CMS</title>
    <style>
        /* ---- CUSTOM HEADER ---- */
        .decap-cms-header {
            background: #800020 !important;
            padding: 15px 25px !important;
            border-bottom: 4px solid #D4AF37 !important;
            min-height: 70px !important;
            display: flex !important;
            align-items: center !important;
        }
        
        /* Hide default logo */
        .decap-cms-header .decap-cms-logo {
            display: none !important;
        }
        .decap-cms-logo {
            display: none !important;
        }
        
        /* Custom header content */
        .custom-header-content {
            display: flex !important;
            align-items: center !important;
            gap: 15px !important;
            width: 100% !important;
            color: white !important;
        }
        
        .custom-header-content .header-logo {
            width: 45px !important;
            height: 45px !important;
            background: url('https://shinnerspreciousacademy.netlify.app/images/logo.png') center/contain no-repeat !important;
            border-radius: 50% !important;
            border: 2px solid #D4AF37 !important;
            flex-shrink: 0 !important;
            background-color: white !important;
        }
        
        .custom-header-content .header-text .school-name {
            font-size: 20px !important;
            font-weight: 700 !important;
            color: white !important;
            letter-spacing: 1px !important;
            line-height: 1.2 !important;
        }
        
        .custom-header-content .header-text .school-tagline {
            font-size: 12px !important;
            color: #D4AF37 !important;
            letter-spacing: 0.5px !important;
            font-weight: 400 !important;
        }
        
        /* ---- LOGIN PAGE ---- */
        .decap-cms-login-page {
            background: linear-gradient(135deg, #800020 0%, #5a0016 100%) !important;
            min-height: 100vh !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }
        
        .decap-cms-login-box {
            background: white !important;
            border-radius: 16px !important;
            padding: 40px !important;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4) !important;
            border-top: 6px solid #D4AF37 !important;
            max-width: 400px !important;
            width: 100% !important;
            text-align: center !important;
        }
        
        .decap-cms-login-box .login-logo {
            display: block !important;
            margin: 0 auto 20px !important;
            width: 80px !important;
            height: 80px !important;
            background: url('https://shinnerspreciousacademy.netlify.app/images/logo.png') center/contain no-repeat !important;
            border-radius: 50% !important;
            border: 3px solid #D4AF37 !important;
            background-color: white !important;
        }
        
        .decap-cms-login-box .login-school-name {
            display: block !important;
            font-size: 22px !important;
            font-weight: 700 !important;
            color: #800020 !important;
            letter-spacing: 1px !important;
            margin-bottom: 5px !important;
        }
        
        .decap-cms-login-box .login-subtitle {
            display: block !important;
            color: #666 !important;
            font-size: 14px !important;
            margin-bottom: 25px !important;
            letter-spacing: 0.5px !important;
        }
        
        .decap-cms-login-box h1 {
            display: none !important;
        }
        
        /* ---- SIDEBAR ---- */
        .decap-cms-sidebar {
            background: #1a1a2e !important;
            border-right: 2px solid #D4AF37 !important;
        }
        
        .decap-cms-sidebar-item {
            color: #ccc !important;
            font-weight: 500 !important;
            padding: 12px 20px !important;
            border-radius: 8px !important;
            margin: 4px 10px !important;
            transition: all 0.3s !important;
        }
        
        .decap-cms-sidebar-item:hover {
            background: rgba(128, 0, 32, 0.3) !important;
            color: white !important;
        }
        
        .decap-cms-sidebar-item-active {
            background: #800020 !important;
            color: #D4AF37 !important;
            border-left: 4px solid #D4AF37 !important;
        }
        
        @media (max-width: 768px) {
            .custom-header-content .header-text .school-name {
                font-size: 14px !important;
            }
            .custom-header-content .header-text .school-tagline {
                font-size: 10px !important;
            }
            .custom-header-content .header-logo {
                width: 35px !important;
                height: 35px !important;
            }
        }
    </style>
</head>
<body>
    <!-- Load Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <script>
        // This script injects the custom header after Decap CMS loads
        (function injectHeader() {
            // Wait for Decap CMS to load
            const observer = new MutationObserver(function(mutations) {
                const header = document.querySelector('.decap-cms-header');
                if (header && !header.querySelector('.custom-header-content')) {
                    // Clear the header
                    header.innerHTML = '';
                    
                    // Create custom header content
                    const customDiv = document.createElement('div');
                    customDiv.className = 'custom-header-content';
                    customDiv.innerHTML = `
                        <div class="header-logo"></div>
                        <div class="header-text">
                            <div class="school-name">Shinners Precious School</div>
                            <div class="school-tagline">Content Management System</div>
                        </div>
                    `;
                    header.appendChild(customDiv);
                    
                    // Stop observing once header is injected
                    observer.disconnect();
                }
            });
            
            // Start observing the document body for changes
            observer.observe(document.body, {
                childList: true,
                subtree: true
            });
        })();
    </script>
</body>
</html>
