<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinners Precious School CMS</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>">
    <style>
        /* Override the header with school branding */
        .decap-cms-header .decap-cms-logo {
            display: none !important;
        }
        .decap-cms-header .decap-cms-header__link {
            display: none !important;
        }
        
        .decap-cms-header {
            background: #800020 !important;
            padding: 10px 20px !important;
            border-bottom: 3px solid #D4AF37 !important;
            min-height: 60px !important;
            display: flex !important;
            align-items: center !important;
        }
        
        /* Create a simple text-based header */
        .decap-cms-header::after {
            content: "🏫 Shinners Precious School CMS" !important;
            font-size: 18px !important;
            font-weight: 700 !important;
            color: white !important;
            letter-spacing: 1px !important;
            display: block !important;
            width: 100% !important;
        }
        
        /* Sidebar styling */
        .decap-cms-sidebar {
            background: #1a1a2e !important;
            border-right: 2px solid #D4AF37 !important;
        }
        
        .decap-cms-sidebar-item {
            color: #ccc !important;
            font-weight: 500 !important;
            padding: 10px 18px !important;
            border-radius: 6px !important;
            margin: 3px 8px !important;
            transition: all 0.3s !important;
        }
        
        .decap-cms-sidebar-item:hover {
            background: rgba(128, 0, 32, 0.3) !important;
            color: white !important;
        }
        
        .decap-cms-sidebar-item-active {
            background: #800020 !important;
            color: #D4AF37 !important;
            border-left: 4px solid #D4AF37 !important;
        }
        
        /* Login page */
        .decap-cms-login-page {
            background: linear-gradient(135deg, #800020 0%, #5a0016 100%) !important;
            min-height: 100vh !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }
        
        .decap-cms-login-box {
            background: white !important;
            border-radius: 16px !important;
            padding: 40px !important;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4) !important;
            border-top: 6px solid #D4AF37 !important;
            max-width: 400px !important;
            width: 100% !important;
            text-align: center !important;
        }
        
        .decap-cms-login-box::before {
            content: "";
            display: block;
            margin: 0 auto 20px;
            width: 80px;
            height: 80px;
            background: url('https://shinnerspreciousacademy.netlify.app/images/logo.png') center/contain no-repeat;
            border-radius: 50%;
            border: 3px solid #D4AF37;
        }
        
        .decap-cms-login-box h1 {
            display: none !important;
        }
        
        .decap-cms-login-box .decap-cms-login-title {
            display: none !important;
        }
        
        @media (max-width: 768px) {
            .decap-cms-header::after {
                font-size: 14px !important;
                content: "🏫 Shinners CMS" !important;
            }
            .decap-cms-login-box {
                padding: 30px 20px !important;
                margin: 20px !important;
            }
            .decap-cms-login-box::before {
                width: 60px !important;
                height: 60px !important;
            }
        }
    </style>
</head>
<body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
