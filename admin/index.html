<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinners Precious School CMS</title>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="custom.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>">
    <style>
        /* Login page styles */
        .decap-cms-login-page {
            background: linear-gradient(135deg, #800020 0%, #5a0016 100%) !important;
            min-height: 100vh !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }
        
        .decap-cms-login-box {
            background: white !important;
            border-radius: 16px !important;
            padding: 40px !important;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4) !important;
            border-top: 6px solid #D4AF37 !important;
            max-width: 400px !important;
            width: 100% !important;
            text-align: center !important;
        }
        
        .decap-cms-login-box .login-logo {
            display: block !important;
            margin: 0 auto 20px !important;
            width: 80px !important;
            height: 80px !important;
            background: url('https://shinnerspreciousacademy.netlify.app/images/logo.png') center/contain no-repeat !important;
            border-radius: 50% !important;
            border: 3px solid #D4AF37 !important;
            background-color: white !important;
        }
        
        .decap-cms-login-box .login-title {
            display: block !important;
            font-size: 22px !important;
            font-weight: 700 !important;
            color: #800020 !important;
            letter-spacing: 1px !important;
            margin-bottom: 5px !important;
        }
        
        .decap-cms-login-box .login-subtitle {
            display: block !important;
            color: #666 !important;
            font-size: 14px !important;
            margin-bottom: 25px !important;
        }
        
        .decap-cms-login-box h1 {
            display: none !important;
        }
        .decap-cms-login-box .decap-cms-login-title {
            display: none !important;
        }
        
        @media (max-width: 768px) {
            .decap-cms-login-box {
                padding: 30px 20px !important;
                margin: 20px !important;
            }
            .decap-cms-login-box .login-logo {
                width: 60px !important;
                height: 60px !important;
            }
            .decap-cms-login-box .login-title {
                font-size: 18px !important;
            }
        }
    </style>
</head>
<body>
    <script>
        // Inject custom header after Decap CMS loads
        (function() {
            // Try to inject immediately
            function injectHeader() {
                const header = document.querySelector('.decap-cms-header');
                if (header && !header.querySelector('.school-header')) {
                    header.innerHTML = '';
                    header.innerHTML = `
                        <div class="school-header">
                            <div class="school-logo"></div>
                            <div>
                                <span class="school-name">Shinners Precious School</span>
                                <span class="school-tagline">Content Management System</span>
                            </div>
                        </div>
                    `;
                    return true;
                }
                return false;
            }

            // Try immediately
            if (!injectHeader()) {
                // If not ready, wait for mutations
                const observer = new MutationObserver(function() {
                    if (injectHeader()) {
                        observer.disconnect();
                    }
                });
                observer.observe(document.body, {
                    childList: true,
                    subtree: true
                });
                // Also try after a delay
                setTimeout(function() {
                    injectHeader();
                    observer.disconnect();
                }, 3000);
            }
        })();
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
