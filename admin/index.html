<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinners Precious School CMS</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>">
    <style>
        /* ========================================
           SHINNERS PRECIOUS SCHOOL - CMS BRANDING
           ======================================== */

        /* ---- LOGIN PAGE ---- */
        /* Target the login page by ID instead of class */
        #login {
            background: linear-gradient(135deg, #800020 0%, #5a0016 100%) !important;
            min-height: 100vh !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }
        
        /* Target the login box by ID */
        .login-box,
        [class*="login-box"] {
            background: white !important;
            border-radius: 16px !important;
            padding: 40px !important;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4) !important;
            border-top: 6px solid #D4AF37 !important;
            max-width: 400px !important;
            width: 100% !important;
            text-align: center !important;
        }

        /* ---- CUSTOM LOGIN ELEMENTS ---- */
        .login-logo {
            display: block !important;
            margin: 0 auto 20px !important;
            width: 80px !important;
            height: 80px !important;
            background: url('/images/logo.png') center/contain no-repeat !important;
            border-radius: 50% !important;
            border: 3px solid #D4AF37 !important;
            background-color: white !important;
        }
        
        .login-school-name {
            display: block !important;
            font-size: 24px !important;
            font-weight: 700 !important;
            color: #800020 !important;
            letter-spacing: 1px !important;
            margin-bottom: 5px !important;
        }
        
        .login-school-motto {
            display: block !important;
            font-size: 14px !important;
            color: #D4AF37 !important;
            font-weight: 600 !important;
            letter-spacing: 2px !important;
            margin-bottom: 25px !important;
        }

        .login-description {
            display: block !important;
            font-size: 13px !important;
            color: #666 !important;
            margin-bottom: 20px !important;
        }

        /* ---- HEADER (After Login) ---- */
        /* Target by attribute or common class */
        [class*="header"] {
            background: #800020 !important;
            border-bottom: 4px solid #D4AF37 !important;
            padding: 12px 25px !important;
            min-height: 65px !important;
            display: flex !important;
            align-items: center !important;
        }

        /* Hide default Decap CMS header elements */
        [class*="header"] [class*="logo"] {
            display: none !important;
        }

        .school-header {
            display: flex !important;
            align-items: center !important;
            gap: 15px !important;
            width: 100% !important;
            color: white !important;
        }
        
        .school-header .school-logo {
            width: 40px !important;
            height: 40px !important;
            background: url('/images/logo.png') center/contain no-repeat !important;
            border-radius: 50% !important;
            border: 2px solid #D4AF37 !important;
            flex-shrink: 0 !important;
            background-color: white !important;
        }
        
        .school-header .school-name {
            font-size: 20px !important;
            font-weight: 700 !important;
            color: white !important;
            letter-spacing: 1px !important;
        }
        
        .school-header .school-tagline {
            font-size: 12px !important;
            color: #D4AF37 !important;
            letter-spacing: 0.5px !important;
            font-weight: 400 !important;
            margin-left: 5px !important;
        }

        /* ---- SIDEBAR ---- */
        [class*="sidebar"] {
            background: #1a1a2e !important;
            border-right: 2px solid #D4AF37 !important;
        }

        [class*="sidebar-item"] {
            color: #ccc !important;
            font-weight: 500 !important;
            padding: 12px 20px !important;
            border-radius: 8px !important;
            margin: 4px 10px !important;
            transition: all 0.3s !important;
        }
        
        [class*="sidebar-item"]:hover {
            background: rgba(128, 0, 32, 0.3) !important;
            color: white !important;
        }

        /* ---- RESPONSIVE ---- */
        @media (max-width: 768px) {
            .school-header .school-name {
                font-size: 14px !important;
            }
            .school-header .school-tagline {
                font-size: 10px !important;
            }
            .school-header .school-logo {
                width: 32px !important;
                height: 32px !important;
            }
            .login-box,
            [class*="login-box"] {
                padding: 30px 20px !important;
                margin: 20px !important;
            }
            .login-logo {
                width: 60px !important;
                height: 60px !important;
            }
            .login-school-name {
                font-size: 18px !important;
            }
        }
    </style>
</head>
<body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <script>
        // ========================================
        // CUSTOM BRANDING - Decap CMS v3 Compatible
        // ========================================

        function applyBranding() {
            let changed = false;

            // ---- LOGIN PAGE ----
            // Try multiple selectors to find the login box
            const loginBox = document.querySelector('.decap-cms-login-box, [class*="login-box"]');
            if (loginBox && !loginBox.querySelector('.login-logo')) {
                // Create branding container
                const branding = document.createElement('div');
                branding.className = 'login-branding';
                branding.innerHTML = `
                    <div class="login-logo"></div>
                    <div class="login-school-name">Shinners Precious School</div>
                    <div class="login-school-motto">Determined to win</div>
                    <div class="login-description">Website Content Management System</div>
                `;
                loginBox.prepend(branding);
                changed = true;
            }

            // ---- HEADER ----
            // Find header by common attributes
            const header = document.querySelector('[class*="header"]');
            if (header && !header.querySelector('.school-header')) {
                // Hide default logo
                const defaultLogo = header.querySelector('[class*="logo"]');
                if (defaultLogo) defaultLogo.style.display = 'none';
                
                // Create custom header
                const customHeader = document.createElement('div');
                customHeader.className = 'school-header';
                customHeader.innerHTML = `
                    <div class="school-logo"></div>
                    <div>
                        <span class="school-name">Shinners Precious School</span>
                        <span class="school-tagline">Content Management System</span>
                    </div>
                `;
                header.prepend(customHeader);
                changed = true;
            }

            return changed;
        }

        // ========================================
        // APPLY BRANDING SAFELY (No infinite loops)
        // ========================================

        let brandingApplied = false;

        function tryApplyBranding() {
            if (brandingApplied) return;
            
            if (applyBranding()) {
                brandingApplied = true;
                observer.disconnect();
            }
        }

        // Try on load
        window.addEventListener('load', tryApplyBranding);

        // Also try after delay for dynamic content
        setTimeout(tryApplyBranding, 500);
        setTimeout(tryApplyBranding, 1000);

        // Watch for DOM changes (but disconnect once done)
        const observer = new MutationObserver(function() {
            if (!brandingApplied) {
                tryApplyBranding();
            }
        });
        observer.observe(document.body, {
            childList: true,
            subtree: true
        });

        // Fallback: try again after 3 seconds
        setTimeout(function() {
            tryApplyBranding();
            observer.disconnect();
        }, 3000);
    </script>
</body>
</html>
