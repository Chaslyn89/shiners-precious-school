<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinners Precious School CMS</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>">
    <style>
        /* ========================================
           SHINNERS PRECIOUS SCHOOL - CMS BRANDING
           ======================================== */

        /* ---- LOGIN PAGE ---- */
        .decap-cms-login-page {
            background: linear-gradient(135deg, #800020 0%, #5a0016 100%) !important;
            min-height: 100vh !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }
        
        .decap-cms-login-box {
            background: white !important;
            border-radius: 16px !important;
            padding: 40px !important;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4) !important;
            border-top: 6px solid #D4AF37 !important;
            max-width: 400px !important;
            width: 100% !important;
            text-align: center !important;
        }
        
        /* Hide default Decap CMS login title */
        .decap-cms-login-box h1 {
            display: none !important;
        }
        .decap-cms-login-box .decap-cms-login-title {
            display: none !important;
        }
        .decap-cms-logo {
            display: none !important;
        }
        
        /* Custom Login Elements */
        .login-logo {
            display: block !important;
            margin: 0 auto 20px !important;
            width: 80px !important;
            height: 80px !important;
            background: url('https://shinners-precious-academy.netlify.app/images/logo.png') center/contain no-repeat !important;
            border-radius: 50% !important;
            border: 3px solid #D4AF37 !important;
            background-color: white !important;
        }
        
        .login-school-name {
            display: block !important;
            font-size: 24px !important;
            font-weight: 700 !important;
            color: #800020 !important;
            letter-spacing: 1px !important;
            margin-bottom: 5px !important;
        }
        
        .login-school-motto {
            display: block !important;
            font-size: 14px !important;
            color: #D4AF37 !important;
            font-weight: 600 !important;
            letter-spacing: 2px !important;
            margin-bottom: 25px !important;
        }

        /* ---- HEADER (After Login) ---- */
        .decap-cms-header {
            background: #800020 !important;
            padding: 12px 25px !important;
            border-bottom: 4px solid #D4AF37 !important;
            min-height: 65px !important;
            display: flex !important;
            align-items: center !important;
        }
        
        .decap-cms-header .decap-cms-logo {
            display: none !important;
        }
        .decap-cms-header .decap-cms-header__link {
            display: none !important;
        }
        
        .school-header {
            display: flex !important;
            align-items: center !important;
            gap: 15px !important;
            width: 100% !important;
            color: white !important;
        }
        
        .school-header .school-logo {
            width: 40px !important;
            height: 40px !important;
            background: url('https://shinners-precious-academy.netlify.app/images/logo.png') center/contain no-repeat !important;
            border-radius: 50% !important;
            border: 2px solid #D4AF37 !important;
            flex-shrink: 0 !important;
            background-color: white !important;
        }
        
        .school-header .school-name {
            font-size: 20px !important;
            font-weight: 700 !important;
            color: white !important;
            letter-spacing: 1px !important;
        }
        
        .school-header .school-tagline {
            font-size: 12px !important;
            color: #D4AF37 !important;
            letter-spacing: 0.5px !important;
            font-weight: 400 !important;
            margin-left: 5px !important;
        }

        /* ---- SIDEBAR ---- */
        .decap-cms-sidebar {
            background: #1a1a2e !important;
            border-right: 2px solid #D4AF37 !important;
        }
        
        .decap-cms-sidebar-item {
            color: #ccc !important;
            font-weight: 500 !important;
            padding: 12px 20px !important;
            border-radius: 8px !important;
            margin: 4px 10px !important;
            transition: all 0.3s !important;
        }
        
        .decap-cms-sidebar-item:hover {
            background: rgba(128, 0, 32, 0.3) !important;
            color: white !important;
        }
        
        .decap-cms-sidebar-item-active {
            background: #800020 !important;
            color: #D4AF37 !important;
            border-left: 4px solid #D4AF37 !important;
        }

        @media (max-width: 768px) {
            .school-header .school-name {
                font-size: 14px !important;
            }
            .school-header .school-tagline {
                font-size: 10px !important;
            }
            .school-header .school-logo {
                width: 32px !important;
                height: 32px !important;
            }
            .decap-cms-login-box {
                padding: 30px 20px !important;
                margin: 20px !important;
            }
            .login-logo {
                width: 60px !important;
                height: 60px !important;
            }
            .login-school-name {
                font-size: 18px !important;
            }
        }
    </style>
</head>
<body>
    <!-- Load Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <script>
        // ========================================
        // CUSTOM BRANDING - Applied After Decap CMS Loads
        // ========================================
        
        function applyBranding() {
            // ---- LOGIN PAGE ----
            const loginBox = document.querySelector('.decap-cms-login-box');
            if (loginBox) {
                // Check if custom elements already exist
                if (!loginBox.querySelector('.login-logo')) {
                    // Add logo
                    const logo = document.createElement('div');
                    logo.className = 'login-logo';
                    loginBox.prepend(logo);
                    
                    // Add school name
                    const name = document.createElement('div');
                    name.className = 'login-school-name';
                    name.textContent = 'Shinners Precious School';
                    loginBox.prepend(name);
                    
                    // Add motto
                    const motto = document.createElement('div');
                    motto.className = 'login-school-motto';
                    motto.textContent = 'Determined to win';
                    loginBox.prepend(motto);
                }
            }
            
            // ---- HEADER ----
            const header = document.querySelector('.decap-cms-header');
            if (header) {
                // Check if custom header already exists
                if (!header.querySelector('.school-header')) {
                    // Hide default logo
                    const defaultLogo = header.querySelector('.decap-cms-logo');
                    if (defaultLogo) defaultLogo.style.display = 'none';
                    
                    // Create custom header
                    const customHeader = document.createElement('div');
                    customHeader.className = 'school-header';
                    customHeader.innerHTML = `
                        <div class="school-logo"></div>
                        <div>
                            <span class="school-name">Shinners Precious School</span>
                            <span class="school-tagline">Content Management System</span>
                        </div>
                    `;
                    header.prepend(customHeader);
                }
            }
        }

        // Try to apply branding immediately
        setTimeout(applyBranding, 100);
        setTimeout(applyBranding, 500);
        setTimeout(applyBranding, 1000);
        setTimeout(applyBranding, 2000);
        
        // Also watch for DOM changes
        const observer = new MutationObserver(function() {
            applyBranding();
        });
        observer.observe(document.body, {
            childList: true,
            subtree: true
        });
    </script>
</body>
</html>
