name: "academics"
label: "📚 Academics"
label_singular: "Academics Page"
description: "Update curriculum information, subjects, and academic programs."
files:
  - name: "academics"
    label: "Academics Content"
    file: "data/academics.json"
    fields:
      - { label: "Hero Title", name: "hero_title", widget: "string", default: "Our Academics" }
      - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string", default: "Competency Based Curriculum (CBC) | Playgroup to Grade 9" }
      - { label: "Pathway Description", name: "pathway_description", widget: "text", default: "Our CBC pathway ensures smooth progression from early years to Junior Secondary." }
      - { label: "Curriculum Overview", name: "curriculum_overview", widget: "markdown", default: "Shinners Precious School follows the Competency Based Curriculum (CBC) approved by the Kenya Institute of Curriculum Development (KICD)." }
      - label: "Achievements"
        name: "achievements"
        widget: "list"
        fields:
          - { label: "Number", name: "number", widget: "string" }
          - { label: "Label", name: "label", widget: "string" }
      - label: "Special Programs"
        name: "special_programs"
        widget: "list"
        fields:
          - { label: "Icon", name: "icon", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Detail", name: "detail", widget: "text" }
      - label: "Assessment"
        name: "assessment"
        widget: "list"
        fields:
          - { label: "Type", name: "type", widget: "string" }
          - { label: "Frequency", name: "frequency", widget: "string" }
          - { label: "Purpose", name: "purpose", widget: "text" }
      - label: "Academic Calendar"
        name: "calendar"
        widget: "list"
        fields:
          - { label: "Term", name: "term", widget: "string" }
          - { label: "Opening Date", name: "opening", widget: "string" }
          - { label: "Closing Date", name: "closing", widget: "string" }
          - { label: "Half-Term Break", name: "half_term", widget: "string" }
      - label: "Downloads"
        name: "downloads"
        widget: "list"
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Link", name: "link", widget: "string" }