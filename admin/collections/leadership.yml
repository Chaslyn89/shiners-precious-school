name: "leadership"
label: "宖捉窶昨沛ｫ Leadership Team"
label_singular: "Leader"
description: "Manage the school's leadership team members."
folder: "data/leadership"
create: true
slug: "{{slug}}"
fields:
  - { label: "Name", name: "name", widget: "string" }
