name: "about"
label: "🏫 About the School"
label_singular: "About Page"
description: "Edit the about page content. Director info comes from Website Settings."
files:
  - name: "about"
    label: "About Content"
    file: "data/about.json"
    fields:
      - { label: "Hero Title", name: "hero_title", widget: "string" }
      - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string" }
      - { label: "Welcome Text", name: "welcome_text", widget: "markdown" }
      - label: "History"
        name: "history"
        widget: "list"
        fields:
          - { label: "Year/Event", name: "year", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
      - { label: "School Motto", name: "motto", widget: "string", required: false }
      - { label: "Motto Description", name: "motto_description", widget: "text", required: false }
      - { label: "Brochure Link", name: "brochure_link", widget: "string", required: false }