name: "testimonials"
label: "💬 Testimonials"
label_singular: "Testimonial"
description: "Manage parent and student testimonials."
folder: "data/testimonials"
create: true
slug: "{{slug}}"
fields:
  - { label: "Parent Name", name: "name", widget: "string" }
  - { label: "Child's Grade", name: "grade", widget: "string" }
  - { label: "Review", name: "review", widget: "markdown" }
  - { label: "Rating (1-5)", name: "rating", widget: "number", default: 5, min: 1, max: 5 }
  - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
  - { label: "Slug", name: "slug", widget: "string", required: true }