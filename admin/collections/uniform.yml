name: "uniform"
label: "👕 School Uniform"
label_singular: "Uniform Item"
description: "Manage uniform items, descriptions, and pricing."
folder: "data/uniform"
create: true
slug: "{{slug}}"
fields:
  - { label: "Name", name: "name", widget: "string" }
  - { label: "Description", name: "description", widget: "text" }
  - { label: "Image", name: "image", widget: "image" }
  - { label: "Price", name: "price", widget: "string" }
  - { label: "Category", name: "category", widget: "select", options: ["maroon", "navy"] }
  - { label: "Display Order", name: "order", widget: "number", default: 0 }