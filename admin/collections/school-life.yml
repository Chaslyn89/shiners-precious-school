name: "school-life"
label: "⚽ School Life"
label_singular: "Activity"
description: "Manage sports, clubs, events, and extra-curricular activities."
folder: "data/school-life"
create: true
slug: "{{slug}}"
fields:
  - { label: "Title", name: "title", widget: "string" }
  - { label: "Description", name: "description", widget: "markdown" }
  - { label: "Image", name: "image", widget: "image" }
  - { label: "Category", name: "category", widget: "select", options: ["sports", "clubs", "events", "testimonials"] }
  - { label: "Display Order", name: "order", widget: "number", default: 0 }