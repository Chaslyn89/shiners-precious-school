backend:
  name: git-gateway
  branch: master

# ====== OFFICIAL DECAP CMS BRANDING ======
logo_url: "https://shinners-precious-academy.netlify.app/images/logo.png"
display_name: "Shinners Precious School"

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  # ========================================
  # GLOBAL SETTINGS (Single Source of Truth)
  # ========================================
  - name: "settings"
    label: "⚙️ Website Settings"
    label_singular: "Setting"
    description: "Manage all global website settings. This is the single source of truth for phone numbers, director info, and social links."
    files:
      - name: "general"
        label: "General Settings"
        file: "data/settings.json"
        fields:
          # School Identity
          - { label: "School Name", name: "school_name", widget: "string", default: "Shinners Precious School" }
          - { label: "School Logo", name: "logo", widget: "image" }
          - { label: "School Motto", name: "motto", widget: "string", default: "Determined to win" }
          - { label: "Favicon", name: "favicon", widget: "image", required: false }
          
          # Contact Information
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Secondary Phone", name: "phone2", widget: "string" }
          - { label: "Email Address", name: "email", widget: "string" }
          - { label: "Physical Address", name: "address", widget: "string", default: "Embakasi, near Imara Daima" }
          - { label: "P.O. Box", name: "po_box", widget: "string", default: "P.O. Box 40-0521, Embakasi" }
          
          # Director Information
          - label: "Director Information"
            name: "director"
            widget: "object"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Title", name: "title", widget: "string", default: "School Director" }
              - { label: "Photo", name: "photo", widget: "image" }
              - { label: "Message", name: "message", widget: "markdown" }
              - { label: "Signature", name: "signature", widget: "markdown" }
          
          # Mission & Vision
          - label: "School Mission & Vision"
            name: "mission_vision"
            widget: "object"
            fields:
              - { label: "Mission", name: "mission", widget: "markdown" }
              - { label: "Vision", name: "vision", widget: "markdown" }
              - { label: "Core Values", name: "core_values", widget: "string" }
          
          # Social Links
          - label: "Social Media Links"
            name: "social"
            widget: "object"
            fields:
              - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
              - { label: "WhatsApp Number", name: "whatsapp", widget: "string" }
              - { label: "TikTok URL", name: "tiktok", widget: "string", required: false }
              - { label: "YouTube URL", name: "youtube", widget: "string", required: false }
          
          # Google Maps
          - { label: "Google Maps Embed URL", name: "google_maps", widget: "string", required: false }
          
          # School Hours
          - label: "School Hours"
            name: "hours"
            widget: "object"
            fields:
              - { label: "Monday - Friday", name: "weekdays", widget: "string", default: "8:00 AM - 4:00 PM" }
              - { label: "Saturday", name: "saturday", widget: "string", default: "9:00 AM - 12:00 PM (Office only)" }
              - { label: "Sunday", name: "sunday", widget: "string", default: "Closed" }
          
          # Footer
          - { label: "Footer Copyright Text", name: "footer_text", widget: "string", default: "Shinners Precious School. All rights reserved." }
          
          # Fees
          - { label: "Admission Fee", name: "admission_fee", widget: "string", default: "KSh 1,000" }
          - { label: "Meals Fee (per term)", name: "meals_fee", widget: "string", default: "KSh 3,900" }

  # ========================================
  # WEBSITE PAGES
  # ========================================
  - name: "homepage"
    label: "🏠 Homepage"
    label_singular: "Homepage"
    description: "Edit the homepage content including hero, welcome section, and statistics."
    files:
      - name: "homepage"
        label: "Homepage Content"
        file: "data/homepage.json"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
          - { label: "Hero Image", name: "hero_image", widget: "image" }
          - { label: "CTA Button Text", name: "cta_button", widget: "string", default: "Enroll Today" }
          - { label: "Welcome Section Title", name: "welcome_title", widget: "string" }
          - { label: "Welcome Content", name: "welcome_content", widget: "markdown" }
          - { label: "Statistics", name: "statistics", widget: "list", fields: [
              { label: "Number", name: "number", widget: "string" },
              { label: "Label", name: "label", widget: "string" }
            ] }

  - name: "about"
    label: "🏫 About the School"
    label_singular: "About Page"
    description: "Edit the about page content. Director info comes from Website Settings."
    files:
      - name: "about"
        label: "About Content"
        file: "data/about.json"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string" }
          - { label: "Welcome Text", name: "welcome_text", widget: "markdown" }
          - { label: "History", name: "history", widget: "list", fields: [
              { label: "Year/Event", name: "year", widget: "string" },
              { label: "Description", name: "description", widget: "text" }
            ] }
          - { label: "School Motto", name: "motto", widget: "string", required: false }
          - { label: "Motto Description", name: "motto_description", widget: "text", required: false }
          - { label: "Brochure Link", name: "brochure_link", widget: "string", required: false }

  - name: "academics"
    label: "📚 Academics"
    label_singular: "Academics Page"
    description: "Update curriculum information, subjects, and academic programs."
    files:
      - name: "academics"
        label: "Academics Content"
        file: "data/academics.json"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string" }
          - { label: "Curriculum Overview", name: "curriculum_overview", widget: "markdown" }

  - name: "admissions"
    label: "📝 Admissions"
    label_singular: "Admissions Page"
    description: "Manage admission requirements, process, fees, and FAQs."
    files:
      - name: "admissions"
        label: "Admissions Content"
        file: "data/admissions.json"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string" }
          - { label: "Admission Process", name: "process", widget: "markdown" }
          - { label: "Requirements", name: "requirements", widget: "markdown" }

  - name: "contact"
    label: "📞 Contact Information"
    label_singular: "Contact Page"
    description: "Edit contact page. Phone and email come from Website Settings."
    files:
      - name: "contact"
        label: "Contact Content"
        file: "data/contact.json"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string" }
          - { label: "Emergency Contact", name: "emergency_contact", widget: "string" }
          - { label: "Contact Form Endpoint", name: "form_endpoint", widget: "string", required: false }

  # ========================================
  # PEOPLE
  # ========================================
  - name: "leadership"
    label: "👨‍🏫 Leadership Team"
    label_singular: "Leader"
    description: "Manage the school's leadership team members."
    folder: "data/leadership"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Photo", name: "photo", widget: "image", required: false }
      - { label: "Display Order", name: "order", widget: "number", default: 0 }

  - name: "staff"
    label: "👥 Staff Directory"
    label_singular: "Staff Member"
    description: "Manage all teaching and support staff profiles."
    folder: "data/staff"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Qualifications", name: "qualifications", widget: "string", required: false }
      - { label: "Subjects", name: "subjects", widget: "string", required: false }
      - { label: "Photo", name: "photo", widget: "image", required: false }
      - { label: "Display Order", name: "order", widget: "number", default: 0 }
      - { label: "Type", name: "type", widget: "select", options: ["teacher", "support", "leadership"], default: "teacher" }

  # ========================================
  # MEDIA & CONTENT
  # ========================================
  - name: "gallery"
    label: "🖼️ Gallery"
    label_singular: "Image"
    description: "Manage all school photos and gallery images."
    folder: "data/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Caption", name: "caption", widget: "text", required: false }
      - { label: "Category", name: "category", widget: "select", options: ["facilities", "classes", "events", "uniform", "staff"] }
      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }

  # ========================================
  # NEWS - With Author Field Added
  # ========================================
  - name: "news"
    label: "📰 News & Events"
    label_singular: "News Article"
    description: "Add, edit, or remove news articles and announcements."
    folder: "data/news"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Content", name: "content", widget: "text" }
      - { label: "Author", name: "author", widget: "string", default: "Administration" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Category", name: "category", widget: "select", options: ["Academic", "Co-Curricular", "School News", "Admissions", "Achievement"] }

  # ========================================
  # TESTIMONIALS - Same as News approach
  # ========================================
  - name: "testimonials"
    label: "💬 Testimonials"
    label_singular: "Testimonial"
    description: "Manage parent and student testimonials."
    folder: "data/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Parent Name", name: "name", widget: "string" }
      - { label: "Child's Grade", name: "grade", widget: "string" }
      - { label: "Review", name: "review", widget: "markdown" }
      - { label: "Rating (1-5)", name: "rating", widget: "number", default: 5, min: 1, max: 5 }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Slug", name: "slug", widget: "string", required: true }

  # ========================================
  # FEES
  # ========================================
  - name: "fees"
    label: "💰 Fees"
    label_singular: "Fee"
    description: "Update the school fee structure."
    files:
      - name: "fees"
        label: "Fee Structure"
        file: "data/fees.json"
        fields:
          - { label: "Playgroup", name: "playgroup", widget: "number", default: 6500 }
          - { label: "PP1", name: "pp1", widget: "number", default: 7000 }
          - { label: "PP2", name: "pp2", widget: "number", default: 7500 }
          - { label: "Grade 1-3", name: "grade1-3", widget: "number", default: 7800 }
          - { label: "Grade 4-5", name: "grade4-5", widget: "number", default: 8100 }
          - { label: "Grade 6", name: "grade6", widget: "number", default: 10800 }
          - { label: "Grade 7-8", name: "grade7-8", widget: "number", default: 9500 }
          - { label: "Grade 9", name: "grade9", widget: "number", default: 14700 }
          - { label: "Meals (per term)", name: "meals", widget: "number", default: 3900 }
          - label: "Transport Fees"
            name: "transport"
            widget: "object"
            fields:
              - { label: "Imara Daima", name: "imara", widget: "number", default: 7000 }
              - { label: "AA & KOBIL", name: "aakobil", widget: "number", default: 6000 }
              - { label: "Pipeline", name: "pipeline", widget: "number", default: 6000 }
              - { label: "Kwanjenga", name: "kwanjenga", widget: "number", default: 6000 }

  # ========================================
  # OTHER
  # ========================================
  - name: "uniform"
    label: "👕 School Uniform"
    label_singular: "Uniform Item"
    description: "Manage uniform items, descriptions, and pricing."
    folder: "data/uniform"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Price", name: "price", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["maroon", "navy"] }
      - { label: "Display Order", name: "order", widget: "number", default: 0 }

  - name: "school-life"
    label: "⚽ School Life"
    label_singular: "Activity"
    description: "Manage sports, clubs, events, and extra-curricular activities."
    folder: "data/school-life"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "markdown" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Category", name: "category", widget: "select", options: ["sports", "clubs", "events", "testimonials"] }
      - { label: "Display Order", name: "order", widget: "number", default: 0 }

  # ========================================
  # TERM DATES
  # ========================================
  - name: "term-dates"
    label: "📅 Term Dates"
    label_singular: "Term Dates"
    description: "Update the current term dates."
    files:
      - name: "term2"
        label: "Term 2 2026"
        file: "data/term-dates.json"
        fields:
          - { label: "Term Name", name: "term_name", widget: "string", default: "Term 2 2026" }
          - { label: "Opening Date", name: "opening_date", widget: "string" }
          - { label: "Mid-Term Break", name: "mid_term_break", widget: "string" }
          - { label: "Closing Date", name: "closing_date", widget: "string" }
          - { label: "Next Holiday", name: "next_holiday", widget: "string" }

  # ========================================
  # UPCOMING EVENTS
  # ========================================
  - name: "upcoming-events"
    label: "📅 Upcoming Events"
    label_singular: "Event"
    description: "Add, edit, or remove upcoming events."
    folder: "data/upcoming-events"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Event Title", name: "title", widget: "string" }
      - { label: "Day", name: "day", widget: "number" }
      - { label: "Month", name: "month", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "MMMM DD, YYYY", time_format: false }
      - { label: "Display Order", name: "order", widget: "number", default: 0 }
