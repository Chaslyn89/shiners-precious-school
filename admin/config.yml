  # ========================================
  # GALLERY - Category-based sections
  # ========================================
  - name: "gallery"
    label: "🖼️ Gallery"
    label_singular: "Image"
    description: "Manage all school photos and gallery images."
    files:
      - name: "gallery"
        label: "Gallery Images"
        file: "data/gallery.json"
        fields:
          # Hero Section
          - { label: "Hero Title", name: "hero_title", widget: "string", default: "Our Gallery" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string", default: "Photos of school life, facilities, and activities" }
          
          # Featured Album
          - label: "Featured Album"
            name: "featured"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string", default: "2026 Sports Day" }
              - { label: "Description", name: "description", widget: "text", default: "Our annual Sports Day was filled with energy, teamwork, and great performances." }
              - { label: "Meta Info", name: "meta", widget: "string", default: "15 Photos | 2 Videos" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Link", name: "link", widget: "string", required: false }
          
          # Category: Facilities
          - label: "🏫 School Facilities"
            name: "facilities"
            widget: "object"
            fields:
              - label: "Photos"
                name: "photos"
                widget: "list"
                fields:
                  - { label: "Image", name: "src", widget: "image" }
                  - { label: "Caption", name: "caption", widget: "string" }
                  - { label: "Description", name: "description", widget: "text", required: false }
          
          # Category: Classes
          - label: "📚 Students in Class"
            name: "classes"
            widget: "object"
            fields:
              - label: "Photos"
                name: "photos"
                widget: "list"
                fields:
                  - { label: "Image", name: "src", widget: "image" }
                  - { label: "Caption", name: "caption", widget: "string" }
                  - { label: "Description", name: "description", widget: "text", required: false }
          
          # Category: Events
          - label: "🎉 Events & Activities"
            name: "events"
            widget: "object"
            fields:
              - label: "Photos"
                name: "photos"
                widget: "list"
                fields:
                  - { label: "Image", name: "src", widget: "image" }
                  - { label: "Caption", name: "caption", widget: "string" }
                  - { label: "Description", name: "description", widget: "text", required: false }
          
          # Category: Uniform
          - label: "👕 Uniform Showcase"
            name: "uniform"
            widget: "object"
            fields:
              - label: "Photos"
                name: "photos"
                widget: "list"
                fields:
                  - { label: "Image", name: "src", widget: "image" }
                  - { label: "Caption", name: "caption", widget: "string" }
                  - { label: "Description", name: "description", widget: "text", required: false }
          
          # Category: Staff
          - label: "👨‍🏫 Staff & Leadership"
            name: "staff"
            widget: "object"
            fields:
              - label: "Photos"
                name: "photos"
                widget: "list"
                fields:
                  - { label: "Image", name: "src", widget: "image" }
                  - { label: "Caption", name: "caption", widget: "string" }
                  - { label: "Description", name: "description", widget: "text", required: false }
          
          # Videos Section
          - label: "School Videos"
            name: "videos"
            widget: "list"
            fields:
              - { label: "Video URL", name: "src", widget: "string" }
              - { label: "Caption", name: "caption", widget: "string" }
              - { label: "Poster Image", name: "poster", widget: "image", required: false }
          
          # CTA Section
          - { label: "CTA Title", name: "cta_title", widget: "string", default: "Experience Shinners Precious School" }
          - { label: "CTA Description", name: "cta_description", widget: "text", default: "The best way to experience our school is to visit us in person." }
          - { label: "CTA Button 1 Text", name: "cta_button1", widget: "string", default: "📅 Book a School Visit" }
          - { label: "CTA Button 1 Link", name: "cta_button1_link", widget: "string", default: "/contact.html" }
          - { label: "CTA Button 2 Text", name: "cta_button2", widget: "string", default: "📝 Enroll Your Child" }
          - { label: "CTA Button 2 Link", name: "cta_button2_link", widget: "string", default: "/admissions.html" }
          
          # Footer Note
          - { label: "Footer Note", name: "footer_note", widget: "text", default: "📸 All photos used with parental consent. For inquiries about photo usage, contact the school administration." }
